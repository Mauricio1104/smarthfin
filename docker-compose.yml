services:
  mysql:
    image: mysql:8.0
    container_name: smarthfin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: smarthfin_root
      MYSQL_DATABASE: smarthfin
    ports:
      - "3306:3306"
    volumes:
      - smarthfin_mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  adminer:
    image: adminer:latest
    container_name: smarthfin-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql

volumes:
  smarthfin_mysql_data:
